<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Unblockable Video</title>
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #111827;
  color: #ffffff;
  font-family: Arial, sans-serif;
}

.page {
  width: min(1100px, calc(100vw - 24px));
  margin: 0 auto;
  padding: 24px 0;
}

.header {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: center;
  margin-bottom: 18px;
}

h1,
h2 {
  margin: 0;
}

h1 {
  font-size: 28px;
}

h2 {
  font-size: 18px;
  margin-bottom: 12px;
}

a {
  color: #38bdf8;
  text-decoration: none;
}

button,
input,
select,
textarea {
  border: 1px solid #374151;
  border-radius: 8px;
  background: #0f172a;
  color: #ffffff;
  padding: 10px;
  font: inherit;
}

button {
  cursor: pointer;
  font-weight: 700;
}

button:hover {
  background: #374151;
}

textarea {
  width: 100%;
  min-height: 86px;
  resize: vertical;
}

.player {
  background: #000000;
  border-radius: 12px;
  overflow: hidden;
}

.stage {
  position: relative;
  aspect-ratio: 16 / 9;
  display: grid;
  place-items: center;
  background: #000000;
}

canvas {
  width: 100%;
  height: 100%;
  display: block;
}

.center {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  pointer-events: none;
}

.centerText {
  border-radius: 999px;
  background: rgba(15, 23, 42, 0.85);
  padding: 22px 28px;
  font-weight: 800;
}

.hidden {
  display: none;
}

.controls,
.card {
  background: #1f2937;
  padding: 14px;
}

.controls {
  display: grid;
  gap: 12px;
}

.row {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.grow {
  flex: 1;
}

.time {
  min-width: 110px;
  color: #d1d5db;
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 14px;
}

.card {
  border-radius: 12px;
}

.full {
  grid-column: 1 / -1;
}

.status {
  color: #d1d5db;
}

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.stat {
  background: #0f172a;
  border-radius: 10px;
  padding: 12px;
}

.stat strong {
  display: block;
  font-size: 20px;
}

.stat span {
  color: #d1d5db;
  font-size: 13px;
}

.progress {
  width: 100%;
  height: 9px;
  background: #0f172a;
  border-radius: 999px;
  overflow: hidden;
}

.progressFill {
  height: 100%;
  width: 0;
  background: #38bdf8;
}

body.embed {
  background: #000000;
}

body.embed .page {
  width: 100%;
  padding: 0;
}

body.embed .header,
body.embed .grid {
  display: none;
}

body.embed .player {
  border-radius: 0;
}

body.embed .stage {
  height: calc(100vh - 96px);
  aspect-ratio: auto;
}

@media (max-width: 760px) {
  .header,
  .row {
    align-items: stretch;
    flex-direction: column;
  }

  .grid,
  .stats {
    grid-template-columns: 1fr;
  }

  .time {
    text-align: left;
  }
}
</style>
</head>
<body>
<div class="page">
  <header class="header">
    <div>
      <h1>Unblockable Video</h1>
      <div id="statusText" class="status">Idle</div>
    </div>
    <a href="/api_doc.html">API Docs</a>
  </header>

  <main class="player">
    <div id="stage" class="stage">
      <canvas id="canvas"></canvas>
      <div id="center" class="center">
        <div id="centerText" class="centerText">PLAY</div>
      </div>
    </div>

    <section class="controls">
      <div class="row">
        <input id="seekInput" class="grow" type="range" min="0" max="100" step="0.01" value="0">
        <div class="time">
          <span id="currentText">0:00</span> /
          <span id="durationText">0:00</span>
        </div>
      </div>

      <div class="row">
        <button id="playButton">Play</button>
        <button id="stopButton">Stop</button>
        <button id="backButton">-10s</button>
        <button id="forwardButton">+10s</button>
        <button id="muteButton">Mute</button>
        <input id="volumeInput" type="range" min="0" max="2" step="0.01" value="1">
        <button id="fullscreenButton">Fullscreen</button>
      </div>

      <div class="row">
        <label>
          Speed
          <select id="speedSelect">
            <option value="0.5">0.5x</option>
            <option value="0.75">0.75x</option>
            <option value="1" selected>1x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2x</option>
          </select>
        </label>

        <label>
          Width
          <select id="widthSelect">
            <option>640</option>
            <option selected>960</option>
            <option>1280</option>
            <option>1600</option>
          </select>
        </label>

        <label>
          FPS
          <select id="fpsSelect">
            <option>24</option>
            <option>30</option>
            <option selected>60</option>
            <option>90</option>
            <option>120</option>
          </select>
        </label>

        <label>
          Quality
          <input id="qualityInput" type="number" min="35" max="95" value="78">
        </label>
      </div>
    </section>
  </main>

  <section class="grid">
    <div class="card full">
      <h2>Source</h2>
      <div class="row">
        <input id="sourceInput" class="grow" placeholder="/media/input.mp4 or https://example.com/video.mp4">
        <button id="loadButton">Load</button>
      </div>
    </div>

    <div class="card">
      <h2>Upload</h2>
      <div class="row">
        <input id="fileInput" class="grow" type="file" accept="video/*">
        <button id="uploadButton">Upload</button>
      </div>
      <div class="progress" style="margin-top:12px">
        <div id="uploadProgress" class="progressFill"></div>
      </div>
      <p id="uploadText" class="status">Upload saves into the server media folder.</p>
    </div>

    <div class="card">
      <h2>Uploads</h2>
      <div class="row">
        <button id="refreshUploadsButton">Refresh</button>
        <select id="uploadSelect" class="grow"></select>
        <button id="useUploadButton">Use</button>
      </div>
    </div>

    <div class="card full">
      <h2>Stats</h2>
      <div class="stats">
        <div class="stat">
          <strong id="drawFpsText">0</strong>
          <span>draw fps</span>
        </div>
        <div class="stat">
          <strong id="receivedText">0</strong>
          <span>received</span>
        </div>
        <div class="stat">
          <strong id="droppedText">0</strong>
          <span>dropped</span>
        </div>
        <div class="stat">
          <strong id="sizeText">0x0</strong>
          <span>source</span>
        </div>
      </div>
    </div>

    <div class="card full">
      <h2>Embed</h2>
      <textarea id="embedText" readonly></textarea>
      <div class="row" style="margin-top:10px">
        <button id="copyEmbedButton">Copy Embed</button>
      </div>
    </div>
  </section>
</div>

<script>
const canvas = document.getElementById("canvas");
const canvasContext = canvas.getContext("2d", { alpha: false });
const stage = document.getElementById("stage");
const center = document.getElementById("center");
const centerText = document.getElementById("centerText");
const statusText = document.getElementById("statusText");
const playButton = document.getElementById("playButton");
const stopButton = document.getElementById("stopButton");
const backButton = document.getElementById("backButton");
const forwardButton = document.getElementById("forwardButton");
const muteButton = document.getElementById("muteButton");
const fullscreenButton = document.getElementById("fullscreenButton");
const seekInput = document.getElementById("seekInput");
const volumeInput = document.getElementById("volumeInput");
const currentText = document.getElementById("currentText");
const durationText = document.getElementById("durationText");
const speedSelect = document.getElementById("speedSelect");
const widthSelect = document.getElementById("widthSelect");
const fpsSelect = document.getElementById("fpsSelect");
const qualityInput = document.getElementById("qualityInput");
const sourceInput = document.getElementById("sourceInput");
const loadButton = document.getElementById("loadButton");
const fileInput = document.getElementById("fileInput");
const uploadButton = document.getElementById("uploadButton");
const uploadProgress = document.getElementById("uploadProgress");
const uploadText = document.getElementById("uploadText");
const uploadSelect = document.getElementById("uploadSelect");
const refreshUploadsButton = document.getElementById("refreshUploadsButton");
const useUploadButton = document.getElementById("useUploadButton");
const drawFpsText = document.getElementById("drawFpsText");
const receivedText = document.getElementById("receivedText");
const droppedText = document.getElementById("droppedText");
const sizeText = document.getElementById("sizeText");
const embedText = document.getElementById("embedText");
const copyEmbedButton = document.getElementById("copyEmbedButton");

let videoSource = "";
let durationSeconds = 0;
let isPlaying = false;
let isMuted = false;
let startedAt = 0;
let startMediaTime = 0;
let frameSocket = null;
let audioSocket = null;
let latestBitmap = null;
let pendingFrameBuffer = null;
let isDecodingFrame = false;
let audioContext = null;
let gainNode = null;
let nextAudioTime = 0;
let audioNodes = [];
let framesDrawn = 0;
let framesReceived = 0;
let framesDropped = 0;
let lastFramesDrawn = 0;
let lastStatsTime = performance.now();

function getUrlParams() {
  return new URLSearchParams(location.search);
}

function getWebSocketBase() {
  const protocol = location.protocol === "https:" ? "wss://" : "ws://";
  return protocol + location.host;
}

function formatTime(seconds) {
  const safeSeconds = Math.max(0, Number(seconds) || 0);
  const hours = Math.floor(safeSeconds / 3600);
  const minutes = Math.floor(safeSeconds % 3600 / 60);
  const remainingSeconds = Math.floor(safeSeconds % 60);

  if (hours) {
    return `${hours}:${String(minutes).padStart(2, "0")}:${String(remainingSeconds).padStart(2, "0")}`;
  }

  return `${minutes}:${String(remainingSeconds).padStart(2, "0")}`;
}

function getMediaTime() {
  if (!isPlaying) {
    return startMediaTime;
  }

  return startMediaTime + (performance.now() - startedAt) / 1000 * Number(speedSelect.value);
}

function setStatus(message) {
  statusText.textContent = message;
}

function showCenter(message) {
  centerText.textContent = message;
  center.classList.remove("hidden");
}

function hideCenter() {
  center.classList.add("hidden");
}

function updateEmbedCode() {
  const selectedSource = sourceInput.value.trim() || videoSource || "/media/input.mp4";
  embedText.value = `<src width="960px" height="540px">${selectedSource}</src>\n<script src="${location.origin}/api/player.js"><\/script>`;
}

async function loadMetadata() {
  const statusUrl = videoSource ? `/api/status?src=${encodeURIComponent(videoSource)}` : "/api/status";
  const response = await fetch(statusUrl);
  const metadata = await response.json();

  if (!videoSource && metadata.source) {
    videoSource = metadata.source;
  }

  durationSeconds = Number(metadata.duration || 0);
  durationText.textContent = formatTime(durationSeconds);
  sizeText.textContent = `${metadata.width || 0}x${metadata.height || 0}`;
  sourceInput.value = metadata.source || videoSource || "";
  updateEmbedCode();

  return metadata;
}

async function setVideoSource(nextSource) {
  videoSource = nextSource.trim();

  if (videoSource) {
    const response = await fetch("/api/source", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ src: videoSource })
    });

    const result = await response.json();

    if (!result.ok) {
      setStatus(result.error || "Source error");
      return;
    }
  }

  await loadMetadata();
  stopPlayback();
}

function closeSockets() {
  if (frameSocket) {
    frameSocket.onclose = null;
    frameSocket.close();
    frameSocket = null;
  }

  if (audioSocket) {
    audioSocket.onclose = null;
    audioSocket.close();
    audioSocket = null;
  }
}

function ensureAudio() {
  if (audioContext) {
    return;
  }

  const AudioConstructor = window.AudioContext || window.webkitAudioContext;

  if (!AudioConstructor) {
    return;
  }

  audioContext = new AudioConstructor();
  gainNode = audioContext.createGain();
  gainNode.gain.value = isMuted ? 0 : Number(volumeInput.value);
  gainNode.connect(audioContext.destination);
  nextAudioTime = audioContext.currentTime + 0.12;
}

function clearAudio() {
  for (const audioNode of audioNodes) {
    try {
      audioNode.stop();
    } catch (error) {
    }
  }

  audioNodes = [];

  if (audioContext) {
    nextAudioTime = audioContext.currentTime + 0.12;
  }
}

function playPcmAudio(buffer) {
  if (!audioContext || !gainNode) {
    return;
  }

  const samples = new Int16Array(buffer);
  const channelCount = 2;
  const frameCount = Math.floor(samples.length / channelCount);

  if (frameCount <= 0) {
    return;
  }

  const audioBuffer = audioContext.createBuffer(channelCount, frameCount, 48000);

  for (let channelIndex = 0; channelIndex < channelCount; channelIndex++) {
    const channelSamples = audioBuffer.getChannelData(channelIndex);

    for (let frameIndex = 0; frameIndex < frameCount; frameIndex++) {
      channelSamples[frameIndex] = samples[frameIndex * channelCount + channelIndex] / 32768;
    }
  }

  const audioNode = audioContext.createBufferSource();
  audioNode.buffer = audioBuffer;
  audioNode.connect(gainNode);
  audioNode.onended = function () {
    const audioNodeIndex = audioNodes.indexOf(audioNode);

    if (audioNodeIndex > -1) {
      audioNodes.splice(audioNodeIndex, 1);
    }
  };

  const startTime = Math.max(nextAudioTime, audioContext.currentTime + 0.03);
  audioNode.start(startTime);
  nextAudioTime = startTime + audioBuffer.duration;
  audioNodes.push(audioNode);

  if (audioNodes.length > 32) {
    try {
      audioNodes.shift().stop();
    } catch (error) {
    }
  }
}

async function decodePendingFrame() {
  if (isDecodingFrame || !pendingFrameBuffer) {
    return;
  }

  isDecodingFrame = true;

  const frameBuffer = pendingFrameBuffer;
  pendingFrameBuffer = null;

  try {
    const frameView = new DataView(frameBuffer);
    const magic = String.fromCharCode.apply(null, new Uint8Array(frameBuffer.slice(0, 4)));

    if (magic === "IMG1") {
      const frameWidth = frameView.getUint16(4, true);
      const frameHeight = frameView.getUint16(6, true);
      const jpegSize = frameView.getUint32(16, true);
      const jpegBuffer = frameBuffer.slice(20, 20 + jpegSize);
      const nextBitmap = await createImageBitmap(new Blob([jpegBuffer], { type: "image/jpeg" }));

      if (latestBitmap) {
        latestBitmap.close();
      }

      latestBitmap = nextBitmap;

      if (frameWidth > 0 && frameHeight > 0 && (canvas.width !== frameWidth || canvas.height !== frameHeight)) {
        canvas.width = frameWidth;
        canvas.height = frameHeight;
      }
    }
  } catch (error) {
  }

  isDecodingFrame = false;

  if (pendingFrameBuffer) {
    decodePendingFrame();
  }
}

function connectFrameSocket(startSeconds) {
  const frameParams = new URLSearchParams({
    src: videoSource,
    start: String(startSeconds),
    speed: speedSelect.value,
    width: widthSelect.value,
    fps: fpsSelect.value,
    quality: qualityInput.value
  });

  frameSocket = new WebSocket(`${getWebSocketBase()}/api/frames?${frameParams.toString()}`);
  frameSocket.binaryType = "arraybuffer";

  frameSocket.onopen = function () {
    setStatus("Connected");
  };

  frameSocket.onclose = function () {
    if (isPlaying) {
      setStatus("Video ended");
    }
  };

  frameSocket.onmessage = function (event) {
    if (typeof event.data === "string") {
      return;
    }

    framesReceived++;

    if (pendingFrameBuffer) {
      framesDropped++;
    }

    pendingFrameBuffer = event.data;
    decodePendingFrame();
  };
}

function connectAudioSocket(startSeconds) {
  ensureAudio();
  clearAudio();

  if (audioContext && audioContext.state === "suspended") {
    audioContext.resume();
  }

  const audioParams = new URLSearchParams({
    src: videoSource,
    start: String(startSeconds),
    speed: speedSelect.value
  });

  audioSocket = new WebSocket(`${getWebSocketBase()}/api/audio?${audioParams.toString()}`);
  audioSocket.binaryType = "arraybuffer";

  audioSocket.onmessage = function (event) {
    if (typeof event.data === "string") {
      return;
    }

    playPcmAudio(event.data);
  };
}

function startPlayback() {
  if (isPlaying) {
    return;
  }

  if (!videoSource && sourceInput.value.trim()) {
    videoSource = sourceInput.value.trim();
  }

  if (!videoSource) {
    setStatus("Load a source first");
    return;
  }

  ensureAudio();

  if (audioContext && audioContext.state === "suspended") {
    audioContext.resume();
  }

  isPlaying = true;
  startedAt = performance.now();
  hideCenter();
  playButton.textContent = "Pause";
  connectFrameSocket(startMediaTime);
  connectAudioSocket(startMediaTime);
}

function pausePlayback() {
  if (!isPlaying) {
    return;
  }

  startMediaTime = getMediaTime();
  isPlaying = false;
  closeSockets();
  clearAudio();
  showCenter("PLAY");
  playButton.textContent = "Play";
  setStatus("Paused");
}

function stopPlayback() {
  startMediaTime = 0;
  isPlaying = false;
  closeSockets();
  clearAudio();
  seekInput.value = "0";
  currentText.textContent = "0:00";
  showCenter("PLAY");
  playButton.textContent = "Play";
  setStatus("Stopped");
}

function restartAt(seconds) {
  startMediaTime = Math.max(0, Math.min(durationSeconds || seconds, seconds));
  startedAt = performance.now();
  closeSockets();
  clearAudio();

  if (isPlaying) {
    connectFrameSocket(startMediaTime);
    connectAudioSocket(startMediaTime);
  }
}

function seekToPercent(percent) {
  const nextTime = durationSeconds ? durationSeconds * Number(percent) / 100 : 0;
  restartAt(nextTime);
  currentText.textContent = formatTime(nextTime);
}

function jumpBy(seconds) {
  restartAt(getMediaTime() + seconds);
}

function drawLoop() {
  if (latestBitmap) {
    canvasContext.drawImage(latestBitmap, 0, 0, canvas.width, canvas.height);
    framesDrawn++;
  }

  const now = performance.now();

  if (now - lastStatsTime >= 1000) {
    drawFpsText.textContent = String(framesDrawn - lastFramesDrawn);
    receivedText.textContent = String(framesReceived);
    droppedText.textContent = String(framesDropped);
    lastFramesDrawn = framesDrawn;
    lastStatsTime = now;
  }

  requestAnimationFrame(drawLoop);
}

function timeLoop() {
  const currentSeconds = getMediaTime();
  currentText.textContent = formatTime(currentSeconds);

  if (durationSeconds > 0 && !seekInput.matches(":active")) {
    seekInput.value = String(Math.min(100, currentSeconds / durationSeconds * 100));
  }

  if (durationSeconds > 0 && currentSeconds >= durationSeconds && isPlaying) {
    stopPlayback();
  }

  requestAnimationFrame(timeLoop);
}

async function refreshUploadList() {
  const response = await fetch("/api/uploads");
  const result = await response.json();

  uploadSelect.innerHTML = "";

  for (const uploadedFile of result.files || []) {
    const uploadOption = document.createElement("option");
    uploadOption.value = uploadedFile.src;
    uploadOption.textContent = uploadedFile.name;
    uploadSelect.appendChild(uploadOption);
  }
}

function uploadVideo() {
  const selectedFile = fileInput.files && fileInput.files[0];

  if (!selectedFile) {
    uploadText.textContent = "Choose a video file first.";
    return;
  }

  const formData = new FormData();
  formData.append("file", selectedFile);

  const request = new XMLHttpRequest();
  request.open("POST", "/api/upload?autoplay=true");

  request.upload.onprogress = function (event) {
    if (event.lengthComputable) {
      uploadProgress.style.width = `${Math.round(event.loaded / event.total * 100)}%`;
    }
  };

  request.onload = async function () {
    let result = {};

    try {
      result = JSON.parse(request.responseText || "{}");
    } catch (error) {
    }

    if (request.status >= 200 && request.status < 300 && result.ok) {
      videoSource = result.src;
      sourceInput.value = videoSource;
      uploadText.textContent = `Uploaded ${result.src}`;
      await loadMetadata();
      stopPlayback();
      await refreshUploadList();
      return;
    }

    uploadText.textContent = result.error || "Upload failed";
  };

  request.onerror = function () {
    uploadText.textContent = "Upload failed";
  };

  request.send(formData);
}

playButton.addEventListener("click", function () {
  isPlaying ? pausePlayback() : startPlayback();
});

stopButton.addEventListener("click", stopPlayback);
backButton.addEventListener("click", function () { jumpBy(-10); });
forwardButton.addEventListener("click", function () { jumpBy(10); });
seekInput.addEventListener("input", function () { seekToPercent(seekInput.value); });

speedSelect.addEventListener("change", function () {
  restartAt(getMediaTime());
});

qualityInput.addEventListener("change", function () {
  if (isPlaying) {
    restartAt(getMediaTime());
  }
});

widthSelect.addEventListener("change", function () {
  if (isPlaying) {
    restartAt(getMediaTime());
  }
});

fpsSelect.addEventListener("change", function () {
  if (isPlaying) {
    restartAt(getMediaTime());
  }
});

volumeInput.addEventListener("input", function () {
  if (gainNode) {
    gainNode.gain.value = isMuted ? 0 : Number(volumeInput.value);
  }
});

muteButton.addEventListener("click", function () {
  isMuted = !isMuted;
  muteButton.textContent = isMuted ? "Unmute" : "Mute";

  if (gainNode) {
    gainNode.gain.value = isMuted ? 0 : Number(volumeInput.value);
  }
});

fullscreenButton.addEventListener("click", function () {
  if (stage.requestFullscreen) {
    stage.requestFullscreen();
  }
});

loadButton.addEventListener("click", function () {
  setVideoSource(sourceInput.value);
});

uploadButton.addEventListener("click", uploadVideo);
refreshUploadsButton.addEventListener("click", refreshUploadList);

useUploadButton.addEventListener("click", function () {
  if (uploadSelect.value) {
    setVideoSource(uploadSelect.value);
  }
});

copyEmbedButton.addEventListener("click", async function () {
  updateEmbedCode();

  try {
    await navigator.clipboard.writeText(embedText.value);
  } catch (error) {
    embedText.select();
    document.execCommand("copy");
  }
});

stage.addEventListener("click", function () {
  isPlaying ? pausePlayback() : startPlayback();
});

document.addEventListener("keydown", function (event) {
  const targetTag = event.target && event.target.tagName;

  if (["INPUT", "TEXTAREA", "SELECT"].includes(targetTag)) {
    return;
  }

  if (event.code === "Space") {
    event.preventDefault();
    isPlaying ? pausePlayback() : startPlayback();
  }

  if (event.code === "ArrowLeft") {
    jumpBy(-5);
  }

  if (event.code === "ArrowRight") {
    jumpBy(5);
  }

  if (event.key === "f") {
    fullscreenButton.click();
  }

  if (event.key === "m") {
    muteButton.click();
  }
});

async function init() {
  const query = getUrlParams();

  if (query.get("embed") === "1") {
    document.body.classList.add("embed");
  }

  videoSource = query.get("src") || "";

  if (videoSource) {
    await setVideoSource(videoSource);
  } else {
    await loadMetadata();
  }

  await refreshUploadList();
  drawLoop();
  timeLoop();
}

init();
</script>
</body>
</html>
